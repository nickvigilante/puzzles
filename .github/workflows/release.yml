name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: <date>-<git-short-sha>)'
        required: false

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install halibut
        run: brew install halibut

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://git.tartarus.org/simon/puzzles.git
          git fetch upstream

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
          else
            base=$(git merge-base HEAD upstream/main)
            d=$(git log -1 --format=%cd --date=format:%Y%m%d "$base")
            n=$(git rev-list --count "$base..HEAD")
            v="0.${d}.${n}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"

      - name: Import signing certificate into temp keychain
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend our keychain to the search list so codesign finds the cert
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          P12_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode -o "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          rm "$P12_PATH"

      - name: Build, sign, notarize
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./release.sh

      - name: Compute artifact metadata
        id: meta
        run: |
          v="${{ steps.version.outputs.version }}"
          dmg="dist/Puzzles-$v.dmg"
          sha=$(shasum -a 256 "$dmg" | awk '{print $1}')
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          {
            echo "## Puzzles $v"
            echo
            echo "Built from commit \`$(git rev-parse HEAD)\`."
            echo
            echo "**SHA-256:** \`$sha\`"
          } > release-notes.md

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.dmg }}
          body_path: release-notes.md

      - name: Upload artifact (non-tag builds)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: Puzzles-${{ steps.version.outputs.version }}
          path: ${{ steps.meta.outputs.dmg }}
